<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3D Feature Viewer — Mol* host</title>
  <!-- Mol* viewer bundle, served as an extension resource (the page runs under the EXTENSION's
       origin + CSP, NOT UniProt's, which is the whole point of hosting the viewer in an iframe). -->
  <link rel="stylesheet" type="text/css" href="lib/molstar.css">
  <style>
    html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #0c111b; overflow: hidden; }
    #app { position: absolute; inset: 0; }
    /* Hide Mol*'s verbose built-in hover label — we render our own annotation tooltip instead. */
    .msp-highlight-info, .msp-highlight-toast-wrapper { display: none !important; }
    /* Hide Mol*'s viewport control panel + buttons (we drive everything from our own modal UI). */
    .msp-viewport-controls, .msp-viewport-top-left-controls { display: none !important; }
    /* Drop Mol*'s default light-tan 1px layout border — it shows as a white line around the dark
       viewport. We supply our own framing in the modal, so no border is needed here. */
    .msp-plugin .msp-layout-standard, .msp-layout-standard { border: none !important; }
    /* Spike status overlay — removed once a structure renders. */
    #ufv-spike-status {
      position: absolute; left: 8px; top: 8px; z-index: 10; font: 12px/1.4 "Segoe UI", Arial, sans-serif;
      color: #cfe8ff; background: rgba(12,17,27,0.85); padding: 6px 10px; border-radius: 6px; max-width: 70%;
    }
    /* Our annotation tooltip, shown only over annotated residues — mirrors the modal's .ufv-tooltip. */
    #ufv-tip {
      position: absolute; z-index: 20; display: none; pointer-events: none;
      font: 12px/1.4 "Segoe UI", Arial, sans-serif; background: rgba(17,24,39,0.92);
      padding: 8px 12px; border-radius: 8px; border: 1px solid rgba(0,188,212,0.35);
      max-width: 300px; box-shadow: 0 4px 20px rgba(0,0,0,0.45); backdrop-filter: blur(10px);
    }
    #ufv-tip .ufv-tip-hdr { font-weight: 600; color: #26c6da; margin-bottom: 3px; font-size: 12.5px; }
    #ufv-tip .ufv-tip-body { color: #cfd6e0; line-height: 1.4; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="ufv-tip"></div>
  <div id="ufv-spike-status">Loading Mol*…</div>
  <script>
    // UniProt's Permissions-Policy header blocks xr-spatial-tracking at the top-frame level,
    // which propagates to our iframe regardless of the allow attribute. Mol* probes navigator.xr
    // on startup and triggers a policy-violation console error. Pre-stub the property as undefined
    // so Mol* sees no XR support without touching the blocked API.
    try {
      Object.defineProperty(navigator, 'xr', { get: () => undefined, configurable: true });
    } catch (_) {}
  </script>
  <script src="lib/molstar.js"></script>
  <script src="viewer-frame.js"></script>
</body>
</html>
