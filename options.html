<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniProt 3D Feature Viewer – Settings</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    font-size: 14px;
    background: #f5f7fa;
    color: #1f2937;
    padding: 32px;
    max-width: 540px;
  }
  h1 { font-size: 18px; font-weight: 700; margin-bottom: 24px; color: #111827; }
  .section { background: #fff; border-radius: 10px; border: 1px solid #e5e7eb; padding: 20px 24px; margin-bottom: 18px; }
  .section h2 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #6b7280; margin-bottom: 14px; }
  .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  .field label { font-size: 13px; font-weight: 500; color: #374151; }
  .field select, .field input[type="text"] {
    height: 32px; padding: 0 10px; border-radius: 6px;
    border: 1px solid #d1d5db; background: #fff; font-size: 13px; color: #1f2937;
  }
  .field select:focus, .field input:focus { outline: 2px solid #3b82f6; outline-offset: 1px; border-color: transparent; }
  .toggle-row { display: flex; align-items: center; gap: 10px; }
  .toggle-row input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
  .toggle-row label { font-size: 13px; color: #374151; cursor: pointer; }
  .save-btn {
    margin-top: 8px; padding: 8px 20px; background: #2563eb; color: #fff;
    border: none; border-radius: 7px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: background 0.15s;
  }
  .save-btn:hover { background: #1d4ed8; }
  .status { margin-top: 10px; font-size: 12px; color: #16a34a; min-height: 18px; }
</style>
</head>
<body>
<h1>UniProt 3D Feature Viewer — Settings</h1>

<div class="section">
  <h2>Default behaviour</h2>
  <div class="field">
    <label for="opt-structure">Default structure preference</label>
    <select id="opt-structure">
      <option value="alphafold">AlphaFold first</option>
      <option value="experimental">Experimental (PDB) first</option>
      <option value="coverage">Best coverage first</option>
    </select>
  </div>
  <div class="field">
    <label for="opt-color">Default coloring mode</label>
    <select id="opt-color">
      <option value="default">Default</option>
      <option value="plddt">pLDDT confidence</option>
      <option value="bfactor">Experimental B-factor</option>
      <option value="alphaMissense">AlphaMissense summary</option>
    </select>
  </div>
</div>

<div class="section">
  <h2>Export</h2>
  <div class="field">
    <label for="opt-copy">Copy-to-clipboard format</label>
    <select id="opt-copy">
      <option value="pymol">PyMOL selection</option>
      <option value="vmd">VMD selection</option>
    </select>
  </div>
</div>

<div class="section">
  <h2>Proximity defaults</h2>
  <div class="field">
    <label for="opt-ptm-radius">PTM search radius (Å) — shown in residue proximity panel</label>
    <input type="number" id="opt-ptm-radius" min="2" max="30" step="1" style="width:80px">
  </div>
  <div class="field">
    <label for="opt-var-radius">Pathogenic variant search radius (Å)</label>
    <input type="number" id="opt-var-radius" min="2" max="30" step="1" style="width:80px">
  </div>
</div>

<div class="section">
  <h2>Appearance</h2>
  <div class="field">
    <label for="opt-font-scale">Font size (3D viewer panels)</label>
    <select id="opt-font-scale">
      <option value="-1">Smaller</option>
      <option value="0">Default</option>
      <option value="1">Larger</option>
    </select>
  </div>
</div>

<div class="section">
  <h2>Advanced</h2>
  <div class="toggle-row" style="margin-bottom:10px">
    <input type="checkbox" id="opt-optional">
    <label for="opt-optional">Show optional conservation / frequency tracks</label>
  </div>
  <div class="toggle-row">
    <input type="checkbox" id="opt-exploratory">
    <label for="opt-exploratory">Show exploratory residue-prioritization algorithms (hotspots, contact hubs, burden, constraint pockets)</label>
  </div>
</div>

<button class="save-btn" id="save-btn">Save settings</button>
<div class="status" id="save-status"></div>

<script src="options.js"></script>
</body>
</html>
